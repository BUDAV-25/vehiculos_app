name: vehiculos_app
description: "Aplicación de gestión de vehículos"

# Evita que se publique en pub.dev
publish_to: 'none'

# Versión de la app
version: 1.0.0+1

# 🔥 IMPORTANTE: SDK CORREGIDO
environment:
  sdk: ">=3.0.0 <4.0.0"

# 📦 DEPENDENCIAS
dependencies:
  flutter:
    sdk: flutter

  # 🔗 API y estado
  dio: ^5.4.0
  provider: ^6.0.5

  # 💾 Almacenamiento local
  shared_preferences: ^2.2.2

  # 🚦 Navegación
  go_router: ^14.0.0

  # 📸 Imágenes y cámara
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # 🌐 Contenido web y multimedia
  youtube_player_flutter: ^9.0.0
  flutter_html: ^3.0.0

  # 🎞 UI y animaciones
  carousel_slider: ^4.2.1
  lottie: ^3.1.0

  # 🔗 Abrir enlaces
  url_launcher: ^6.2.5

  # 📅 Fechas y formatos
  intl: ^0.19.0

  # 📂 Archivos y permisos
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # 🍎 Iconos estilo iOS
  cupertino_icons: ^1.0.8

# 🛠 DEPENDENCIAS DE DESARROLLO
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# 🎨 CONFIGURACIÓN DE FLUTTER
flutter:
  uses-material-design: true

  # 📁 Assets (imágenes, etc.)
  assets:
    - assets/images/

  # 🔤 Ejemplo de fuentes personalizadas (opcional)
  # fonts:
  #   - family: MiFuente
  #     fonts:
  #       - asset: fonts/MiFuente-Regular.ttf